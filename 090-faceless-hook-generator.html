<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Faceless Hook Generator | Digital Biz HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--dbhq-cyan:#00BFE6;--dbhq-mint:#00FF89;--dbhq-electric:#00D4FF;--dbhq-navy:#07111F;--dbhq-black:#050505;--dbhq-white:#FFFFFF;--dbhq-gray:#D9E3EA;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--dbhq-black);}
  body{font-family:'Montserrat',sans-serif;color:var(--dbhq-white);min-height:100vh;
    background:radial-gradient(120% 70% at 50% -10%,rgba(0,191,230,.12),transparent 55%),radial-gradient(90% 60% at 50% 115%,rgba(0,255,137,.08),transparent 60%),var(--dbhq-black);
    padding:0 18px calc(40px + env(safe-area-inset-bottom));}
  .wrap{max-width:520px;margin:0 auto;}
  header{padding:26px 4px 6px;text-align:center;}
  .wordmark{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.06em;}
  .wordmark b{color:var(--dbhq-cyan);font-weight:400;}
  .tagline{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dbhq-gray);opacity:.7;margin-top:6px;}
  .appname{font-family:'Bebas Neue',sans-serif;font-size:46px;line-height:.92;margin-top:16px;
    background:linear-gradient(180deg,var(--dbhq-white),var(--dbhq-cyan) 75%,var(--dbhq-mint) 130%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .appsub{font-size:14px;color:var(--dbhq-gray);margin-top:6px;line-height:1.5;}
  .field{margin-top:16px;}
  .field label{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--dbhq-gray);margin-bottom:8px;}
  .field input{width:100%;min-height:54px;border-radius:13px;background:var(--dbhq-navy);border:1px solid rgba(0,191,230,.25);color:var(--dbhq-white);font-family:'Montserrat';font-size:16px;padding:11px 14px;}
  .field input:focus{outline:none;border-color:var(--dbhq-electric);box-shadow:0 0 0 3px rgba(0,212,255,.22);}
  .field input::placeholder{color:var(--dbhq-gray);opacity:.45;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  .chip{flex:1 1 22%;min-height:42px;border-radius:10px;border:1px solid rgba(0,191,230,.3);background:rgba(0,191,230,.05);color:var(--dbhq-gray);font-weight:700;font-size:12px;cursor:pointer;transition:.18s;}
  .chip.sel{background:linear-gradient(120deg,var(--dbhq-cyan),var(--dbhq-electric));color:var(--dbhq-black);border-color:transparent;}
  .btn{width:100%;border:none;cursor:pointer;border-radius:16px;font-family:'Montserrat';font-weight:800;font-size:17px;
    min-height:58px;margin-top:18px;color:var(--dbhq-black);background:linear-gradient(120deg,var(--dbhq-mint),var(--dbhq-cyan));box-shadow:0 8px 30px rgba(0,255,137,.25);transition:transform .12s;}
  .btn:active{transform:translateY(2px) scale(.99);}
  ul{list-style:none;margin-top:16px;}
  li.hook{display:flex;align-items:flex-start;gap:12px;background:var(--dbhq-navy);border-radius:12px;padding:14px;margin-top:8px;border-left:3px solid var(--dbhq-cyan);}
  li.hook .tx{flex:1;font-size:15.5px;line-height:1.45;}
  li.hook .cp{flex:0 0 auto;width:34px;height:34px;border-radius:9px;border:1px solid rgba(0,191,230,.3);background:transparent;color:var(--dbhq-cyan);cursor:pointer;font-size:14px;}
  li.hook .cp.copied{background:var(--dbhq-mint);color:var(--dbhq-black);border-color:transparent;}
  .empty{text-align:center;font-size:13px;color:var(--dbhq-gray);opacity:.6;font-style:italic;padding:14px 2px;}
  .reward{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-160%);background:linear-gradient(120deg,var(--dbhq-mint),var(--dbhq-cyan));
    color:var(--dbhq-black);font-weight:800;font-size:15px;padding:14px 22px;border-radius:14px;box-shadow:0 0 40px rgba(0,255,137,.6);z-index:50;transition:transform .45s cubic-bezier(.2,1.3,.4,1);max-width:92vw;text-align:center;}
  .reward.show{transform:translateX(-50%) translateY(0);}
  footer{display:flex;justify-content:center;margin-top:40px;padding-bottom:6px;}
  .dbhq-footlogo{width:200px;max-width:62%;height:auto;display:block;mix-blend-mode:screen;filter:drop-shadow(0 0 16px rgba(0,191,230,.25));}
</style>
</head>

<script>
(function(){
  "use strict";
  var reward=document.getElementById("reward"),rt;
  function showReward(m){reward.textContent=m||"Hooks ready.";reward.classList.add("show");clearTimeout(rt);rt=setTimeout(function(){reward.classList.remove("show");},2200);}
  var KEY="dbhq_faceless_hook_v1";
  var state=load()||{topic:"",style:"any"};
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
  function load(){try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;}}
  var topic=document.getElementById("topic");topic.value=state.topic;
  topic.addEventListener("input",function(){state.topic=topic.value;save();});
  var chips=document.querySelectorAll("#styles .chip");
  chips.forEach(function(c){c.classList.toggle("sel",c.dataset.s===state.style);c.addEventListener("click",function(){chips.forEach(function(x){x.classList.remove("sel");});c.classList.add("sel");state.style=c.dataset.s;save();});});

  // AI WIRE POINT: replace hooksFor() with an AI call for sharper, on-trend faceless hooks.
  // INPUT: {topic, style}. OUTPUT: array of hook strings (text overlay style, no face needed).
  function hooksFor(t,style){
    t=t.trim()||"this";
    var T=t;
    var banks={
      curiosity:["Nobody talks about this part of "+T+".","The "+T+" tip I wish I found a year ago.","This changed how I think about "+T+" completely.","Watch this before you try "+T+" again."],
      contrarian:["Everything you have been told about "+T+" is backwards.","Stop doing "+T+" the hard way.","Unpopular take on "+T+":","You do not need motivation for "+T+". You need this."],
      list:["3 "+T+" mistakes quietly costing you.","5 "+T+" tools I actually use.","The only 3 steps for "+T+" that matter.","4 signs your "+T+" approach needs to change."],
      problem:["If "+T+" keeps stalling you, this is why.","Struggling with "+T+"? Start here.","The real reason "+T+" feels so hard.","Here is how to fix "+T+" without burning out."]
    };
    var keys=style==="any"?Object.keys(banks):[style];
    var out=[];
    keys.forEach(function(k){out=out.concat(banks[k]);});
    // shuffle deterministically-ish
    for(var i=out.length-1;i>0;i--){var j=(i*5+Math.floor(performance.now()))%(i+1);var tmp=out[i];out[i]=out[j];out[j]=tmp;}
    return out.slice(0,6);
  }

  document.getElementById("goBtn").addEventListener("click",function(){
    if(!topic.value.trim()){topic.focus();return;}
    var hooks=hooksFor(topic.value,state.style);
    var list=document.getElementById("list");list.innerHTML="";
    hooks.forEach(function(h){
      var li=document.createElement("li");li.className="hook";
      li.innerHTML='<span class="tx"></span><button class="cp" aria-label="Copy">⧉</button>';
      li.querySelector(".tx").textContent=h;
      var b=li.querySelector(".cp");
      b.addEventListener("click",function(){navigator.clipboard&&navigator.clipboard.writeText(h);b.textContent="✓";b.classList.add("copied");setTimeout(function(){b.textContent="⧉";b.classList.remove("copied");},1200);});
      list.appendChild(li);
    });
    showReward("Hooks ready. No face required.");
  });
})();
